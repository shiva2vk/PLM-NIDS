cic_days:
  'Friday-WorkingHours ':
    attack_type: Botnet_PortScan_DDoS
    binary_label: 1
    role: finetune_eval
  Monday-WorkingHours:
    attack_type: BENIGN
    binary_label: 0
    role: pretrain
  Thursday-WorkingHours:
    attack_type: WebAttacks_Infiltration
    binary_label: 1
    role: finetune_eval
  Tuesday-WorkingHours:
    attack_type: FTP-Patator_SSH-Patator
    binary_label: 1
    role: finetune_eval
  Wednesday-workingHours:
    attack_type: DoS_Heartbleed
    binary_label: 1
    role: finetune_eval
evaluation:
  batch_size: 512
  dpi: 150
  plot_dir: ./plots
  show_random_baseline: true
inference:
  flow_ttl_seconds: 300
  max_cached_flows: 100000
  score_mode: perplexity
  threshold_percentile: 95.0
model:
  backbone: rwkv
  d_model: 256
  dropout: 0.1
  n_classes: 2
  n_layers: 6
  tie_embeddings: true
paths:
  checkpoint_dir: /home/jupyter/vks_bucket/plm_nids/checkpoints
  log_dir: /tmp/plm_logs
  output_dir: /home/jupyter/vks_bucket/plm_nids/outputs
  pcap_dir: /home/jupyter/vks_bucket/plm_nids/outputs
  plot_dir: /home/jupyter/vks_bucket/plm_nids/plots
tokenizer:
  fit_sample_n: 300000
  flow_timeout: 120.0
  max_pkts_per_flow: 128
  n_dt_bins: 32
  n_len_bins: 32
  n_port_buckets: 64
  n_ttl_bins: 16
  save_path: ./checkpoints/pcap_tokenizer.pkl
training:
  device: auto
  eval_every: 1
  grad_accumulation_steps: 1
  gradient_clip: 1.0
  log_dir: ./logs
  log_every: 100
  max_seq_len: 128
  phase1:
    batch_size: 64
    checkpoint: ./checkpoints/phase1_best.pt
    early_stop_patience: 5
    epochs: 10
    lr: 0.0003
    max_flows: null
    val_frac: 0.1
    warmup_steps: 500
    weight_decay: 1.0e-05
  phase2:
    attack_class_weight: 8.0
    batch_size: 64
    checkpoint: ./checkpoints/phase2_best.pt
    cls_loss_weight: 1.0
    early_stop_patience: 4
    epochs: 5
    freeze_backbone_epochs: 2
    lm_loss_weight: 0.2
    lr: 5.0e-05
    val_frac: 0.1
    warmup_steps: 300
    weight_decay: 1.0e-05
  random_seed: 42
  save_dir: ./checkpoints
